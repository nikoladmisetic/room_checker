name: Run Python Script

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ] # Triggers the workflow on push to the main branch
  workflow_dispatch:      # Allows you to manually trigger the run from GitHub's website

jobs:
  run-code:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your repository code onto the runner
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Install Python on the runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Change to match your PyCharm Python version

    # Step 3: Install dependencies (uncomment if you have a requirements.txt file)
    # - name: Install dependencies
    #   run: |
    #     python -m pip install --upgrade pip
    #     if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run your main script
    - name: Execute Python Script
      run: python room_checker.py # Replace main.py with the name of your entry script
